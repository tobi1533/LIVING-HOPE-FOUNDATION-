<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Living Hope Foundation</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#000;color:#fff;}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:20px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.7);
  z-index:1000;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}
.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{color:white;text-decoration:none;}
.menu-icon{display:none;font-size:28px;cursor:pointer;}

/* HERO */
.hero{
  height:40vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('LHF3.jpg') center/cover no-repeat;
}
.hero h1{font-size:40px;}

/* CONTACT SECTION */
.contact-section{
  padding:100px 8%;
  text-align:center;
}

/* ICON GRID */
.contact-icons{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
  margin-top:40px;
}

/* ICON STYLE (same feel as homepage) */
.icon{
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1a1a1a;
  transition:0.3s;
}
.icon img{
  width:32px;
  height:32px;
}
.icon:hover{
  transform:scale(1.15);
}

/* COLORS */
.whatsapp:hover{background:#25D366;}
.facebook:hover{background:#1877F2;}
.instagram:hover{background:#E1306C;}
.email:hover{background:#EA4335;}
.phone:hover{background:#27ae60;}

/* FORM */
form{
  margin-top:60px;
  max-width:500px;
  margin-left:auto;
  margin-right:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}
input, textarea{
  padding:12px;
  border:none;
  border-radius:5px;
  background:#111;
  color:#fff;
}
textarea{height:120px;}

button{
  padding:12px;
  background:#27ae60;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .menu-icon{display:block;}
  .nav-links{
    position:absolute;
    top:70px;
    right:0;
    background:#000;
    flex-direction:column;
    padding:20px;
    display:none;
  }
  .nav-links.active{display:flex;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">
<img src="logo.png">
<h2>Living Hope Foundation</h2>
</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<ul class="nav-links" id="navLinks">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Contact Us</h1>
</section>

<!-- CONTACT ICONS -->
<section class="contact-section">

<h2>Reach Us Directly</h2>

<div class="contact-icons">

<a href="https://wa.me/2347034447700" target="_blank" class="icon whatsapp">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<a href="https://www.facebook.com/share/17vVH9Npcd/" target="_blank" class="icon facebook">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a>

<a href="https://www.instagram.com/akeem.fatai.1213?igsh=eW52NGx5ZnJjdmxx" target="_blank" class="icon instagram">
<img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
</a>

<a href="mailto:akeem.fatai@gmail.com" class="icon email">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
</a>

<a href="tel:+2347034447700" class="icon phone">
<img src="https://cdn-icons-png.flaticon.com/512/724/724664.png">
</a>

</div>

<!-- FORM -->
<form action="https://formspree.io/f/your-form-id" method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>

</section>

<script>
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
