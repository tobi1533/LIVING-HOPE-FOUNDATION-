<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Living Hope Foundation</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#000;color:#fff;}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:20px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.7);
  z-index:1000;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}
.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{color:white;text-decoration:none;}
.menu-icon{display:none;font-size:28px;cursor:pointer;}

/* HERO */
.hero{
  height:40vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('LHF3.jpg') center/cover no-repeat;
}
.hero h1{font-size:40px;}

/* CONTACT SECTION */
.contact-section{
  padding:100px 8%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
}

/* CONTACT INFO */
.contact-info{
  display:flex;
  flex-direction:column;
  gap:20px;
}
.contact-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
}
.contact-box h3{margin-bottom:10px;color:#27ae60;}
.contact-box a{color:#fff;text-decoration:none;}

/* FORM */
form{
  display:flex;
  flex-direction:column;
  gap:15px;
}
input, textarea{
  padding:12px;
  border:none;
  border-radius:5px;
  background:#111;
  color:#fff;
}
textarea{height:120px;}

button{
  padding:12px;
  background:#27ae60;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#000;
}

/* MOBILE */
@media(max-width:768px){
  .contact-section{
    grid-template-columns:1fr;
  }
  .menu-icon{display:block;}
  .nav-links{
    position:absolute;
    top:70px;
    right:0;
    background:#000;
    flex-direction:column;
    padding:20px;
    display:none;
  }
  .nav-links.active{display:flex;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">
<img src="logo.png">
<h2>Living Hope Foundation</h2>
</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<ul class="nav-links" id="navLinks">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Contact Us</h1>
</section>

<!-- CONTACT -->
<section class="contact-section">

<!-- LEFT SIDE -->
<div class="contact-info">

<div class="contact-box">
<h3>WhatsApp</h3>
<a href="https://wa.me/2347034447700" target="_blank">Chat on WhatsApp</a>
</div>

<div class="contact-box">
<h3>Phone</h3>
<a href="tel:+2347034447700">+234 703 444 7700</a>
</div>

<div class="contact-box">
<h3>Email</h3>
<a href="mailto:akeem.fatai15@gmail.com">akeem.fatai15@gmail.com</a>
</div>

<div class="contact-box">
<h3>Facebook</h3>
<a href="https://www.facebook.com/share/17vVH9Npcd/" target="_blank">Visit Page</a>
</div>

<div class="contact-box">
<h3>Instagram</h3>
<a href="https://www.instagram.com/akeem.fatai.1213?igsh=eW52NGx5ZnJjdmxx" target="_blank">View Profile</a>
</div>

</div>

<!-- RIGHT SIDE (FORM) -->
<form action="https://formspree.io/f/your-form-id" method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>

<button type="submit">Send Message</button>
</form>

</section>

<!-- FOOTER -->
<footer>
<p>© Living Hope Foundation</p>
</footer>

<script>
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
  </html>
